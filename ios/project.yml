name: IrisDriveIOS
options:
  bundleIdPrefix: to.iris.drive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  IrisDriveIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        optional: true
    settings:
      base:
        PRODUCT_NAME: Iris Drive
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.drive.ios
        PRODUCT_MODULE_NAME: IrisDriveIOS
        CODE_SIGN_ENTITLEMENTS: IrisDriveIOS.entitlements
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Drive
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: IrisDriveFileProvider

  IrisDriveFileProvider:
    type: app-extension
    platform: iOS
    sources:
      - path: FileProvider
    settings:
      base:
        PRODUCT_NAME: IrisDriveFileProvider
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.drive.ios.FileProvider
        PRODUCT_MODULE_NAME: IrisDriveFileProvider
        CODE_SIGN_ENTITLEMENTS: FileProvider/FileProvider.entitlements
        INFOPLIST_FILE: FileProvider/Info.plist
        SKIP_INSTALL: YES
