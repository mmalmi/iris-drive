name: IrisDriveIOS
options:
  bundleIdPrefix: fi.siriusbusiness.drive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.18"
    CURRENT_PROJECT_VERSION: "1018"
    VERSIONING_SYSTEM: apple-generic
    DEVELOPMENT_TEAM: 8G9P8AN75D
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "1,2"
    IRIS_DRIVE_IOS_BUNDLE_ID: fi.siriusbusiness.drive
    IRIS_DRIVE_IOS_FILE_PROVIDER_BUNDLE_ID: fi.siriusbusiness.drive.FileProvider
    IRIS_DRIVE_IOS_SHARE_EXTENSION_BUNDLE_ID: fi.siriusbusiness.drive.ShareExtension
    IRIS_DRIVE_IOS_SHARE_SOURCE_BUNDLE_ID: fi.siriusbusiness.drive.ShareSource
    IRIS_DRIVE_IOS_SHARE_EXTENSION_TESTS_BUNDLE_ID: fi.siriusbusiness.drive.ShareExtensionTests
    IRIS_DRIVE_IOS_UI_TESTS_BUNDLE_ID: fi.siriusbusiness.drive.UITests
    IRIS_DRIVE_IOS_APP_GROUP_IDENTIFIER: group.fi.siriusbusiness.drive
    IRIS_DRIVE_IOS_BACKGROUND_SYNC_TASK_IDENTIFIER: fi.siriusbusiness.drive.background-sync

targets:
  IrisDriveIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        optional: true
    settings:
      base:
        PRODUCT_NAME: Iris Drive
        PRODUCT_BUNDLE_IDENTIFIER: $(IRIS_DRIVE_IOS_BUNDLE_ID)
        PRODUCT_MODULE_NAME: IrisDriveIOS
        CODE_SIGN_ENTITLEMENTS: IrisDriveIOS.entitlements
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Drive
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: IrisDriveIOSDebug.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(IRIS_DRIVE_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(IRIS_DRIVE_IOS_PROVISIONING_PROFILE_UUID)
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(IRIS_DRIVE_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(IRIS_DRIVE_IOS_PROVISIONING_PROFILE_UUID)
    dependencies:
      - target: IrisDriveFileProvider
      - target: IrisDriveShareExtension

  IrisDriveFileProvider:
    type: app-extension
    platform: iOS
    sources:
      - path: FileProvider
      - path: Sources/IrisDriveNativeCore.swift
    settings:
      base:
        PRODUCT_NAME: IrisDriveFileProvider
        PRODUCT_BUNDLE_IDENTIFIER: $(IRIS_DRIVE_IOS_FILE_PROVIDER_BUNDLE_ID)
        PRODUCT_MODULE_NAME: IrisDriveFileProvider
        CODE_SIGN_ENTITLEMENTS: FileProvider/FileProvider.entitlements
        INFOPLIST_FILE: FileProvider/Info.plist
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: FileProvider/FileProviderDebug.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(IRIS_DRIVE_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(IRIS_DRIVE_IOS_FILE_PROVIDER_PROVISIONING_PROFILE_UUID)
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(IRIS_DRIVE_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(IRIS_DRIVE_IOS_FILE_PROVIDER_PROVISIONING_PROFILE_UUID)

  IrisDriveShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Sources/IrisDriveNativeCore.swift
      - path: FileProvider/FileProviderStorage.swift
      - path: FileProvider/FileProviderItem.swift
    settings:
      base:
        PRODUCT_NAME: IrisDriveShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: $(IRIS_DRIVE_IOS_SHARE_EXTENSION_BUNDLE_ID)
        PRODUCT_MODULE_NAME: IrisDriveShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        INFOPLIST_FILE: ShareExtension/Info.plist
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(IRIS_DRIVE_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(IRIS_DRIVE_IOS_SHARE_EXTENSION_PROVISIONING_PROFILE_UUID)
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: $(IRIS_DRIVE_IOS_CODE_SIGN_IDENTITY)
          PROVISIONING_PROFILE: $(IRIS_DRIVE_IOS_SHARE_EXTENSION_PROVISIONING_PROFILE_UUID)

  IrisDriveShareSource:
    type: application
    platform: iOS
    sources:
      - path: ShareSource
    settings:
      base:
        PRODUCT_NAME: Iris Drive Share Source
        PRODUCT_BUNDLE_IDENTIFIER: $(IRIS_DRIVE_IOS_SHARE_SOURCE_BUNDLE_ID)
        PRODUCT_MODULE_NAME: IrisDriveShareSource
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Iris Drive Share Source
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Automatic

  IrisDriveIOSShareExtensionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnitTests
      - path: ShareExtension/ShareItemImporter.swift
    settings:
      base:
        PRODUCT_NAME: IrisDriveIOSShareExtensionTests
        PRODUCT_BUNDLE_IDENTIFIER: $(IRIS_DRIVE_IOS_SHARE_EXTENSION_TESTS_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisDriveIOS
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Iris Drive.app/Iris Drive"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: IrisDriveIOS

  IrisDriveIOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        PRODUCT_NAME: IrisDriveIOSUITests
        PRODUCT_BUNDLE_IDENTIFIER: $(IRIS_DRIVE_IOS_UI_TESTS_BUNDLE_ID)
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisDriveIOS
    dependencies:
      - target: IrisDriveIOS
      - target: IrisDriveShareSource

schemes:
  IrisDriveIOS:
    build:
      targets:
        IrisDriveIOS: all
        IrisDriveFileProvider: all
        IrisDriveShareExtension: all
        IrisDriveShareSource: [test]
        IrisDriveIOSUITests: [test]
    test:
      targets:
        - IrisDriveIOSShareExtensionTests
        - IrisDriveIOSUITests
