<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>External Links Fixture</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #f7f8fb;
      color: #17181c;
    }
    body {
      margin: 0;
      padding: 22px 18px 160px;
    }
    main {
      display: grid;
      gap: 16px;
      max-width: 560px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
    }
    a {
      display: grid;
      min-height: 180px;
      place-items: center;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 18px;
      background: #ffffff;
      color: #101417;
      font-size: 22px;
      font-weight: 650;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>External links</h1>
    <a id="proton" href="https://proton.me/mail" aria-label="Proton Mail">Proton Mail</a>
    <a id="silent" href="https://silent.link/" aria-label="silent.link">silent.link</a>
  </main>
</body>
</html>
