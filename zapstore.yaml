name: Iris Drive
summary: Private peer-aware file sync over local htree storage.
description: |
  Iris Drive is Drive-style sync built on local htree storage, Nostr identity,
  and direct peer replication.

  Current app capabilities:
  - local-first file sync with content-addressed htree storage
  - device invite and approval flows
  - native provider surfaces on supported platforms
  - direct hashtree-over-FIPS block transfer between authorized devices
  - drive.iris.to links for browser viewing

